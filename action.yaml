# https://docs.github.com/en/actions/sharing-automations/creating-actions/creating-a-composite-action
name: "rxiv Feed Action"
description: "Log a weekly CSV feed of papers from arXiv, bioRxiv, or medRxiv for selected categories."
author: "qte77"
branding:
  icon: "file-text"
  color: "green"
inputs:
  OUT_DIR:
    description: >-
      Directory to write CSV output files. Convention: ./data/<server>
      (e.g. ./data/arxiv) so multiple servers coexist without colliding.
    default: "./data/arxiv"
  SERVER:
    description: "API server: arxiv, biorxiv, or medrxiv."
    default: "arxiv"
  TOPICS:
    description: >-
      arXiv search_query (URL-encoded, OR-joined). Used when SERVER=arxiv.
      Example: 'cat:cs.CV+OR+cat:cs.LG'.
    default: "cat:cs.CV+OR+cat:cs.LG+OR+cat:cs.CL+OR+cat:cs.AI+OR+cat:cs.NE+OR+cat:cs.RO"
  INCLUDE_CITATIONS:
    description: >-
      Enrich arXiv rows with Semantic Scholar citation counts (true/false).
      Adds Citations/References/InfluentialCitations columns. arXiv only.
    default: "false"
  SEMANTIC_SCHOLAR_API_KEY:
    description: "Optional Semantic Scholar API key for higher rate limits."
    default: ""
  MAX_AGE_DAYS:
    description: "arXiv only: skip papers published more than N days ago."
    default: "7"
  DATE_FROM:
    description: >-
      YYYY-MM-DD lower bound. arXiv: bounds submittedDate (empty = use
      MAX_AGE_DAYS). bioRxiv/medRxiv: overrides the rolling DAYS window
      (empty = use DAYS). Useful for backfill dispatches.
    default: ""
  DATE_TO:
    description: >-
      YYYY-MM-DD upper bound. arXiv: bounds submittedDate (empty = today).
      bioRxiv/medRxiv: overrides the rolling DAYS window (empty = today).
    default: ""
  PAGE_SIZE:
    description: "arXiv only: results per pagination page."
    default: "1000"
  MAX_PAGES:
    description: "arXiv only: cap on pagination pages per run."
    default: "5"
  DAYS:
    description: "bioRxiv/medRxiv only: number of days back to fetch."
    default: "1"
  CATEGORIES:
    description: >-
      bioRxiv/medRxiv only: comma-separated categories to keep
      (case-insensitive). Empty keeps all. Filtering is applied
      client-side; the bioRxiv /details/ API has no server-side category
      filter.
    default: ""
  TOKEN:
    description: "GitHub token for pushing changes."
    default: ""
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
        token: ${{ inputs.TOKEN || github.token }}

    - name: Setup uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        enable-cache: true

    - name: Fetch and write rxiv stats
      shell: bash
      env:
        OUT_DIR: ${{ inputs.OUT_DIR }}
        SERVER: ${{ inputs.SERVER }}
        TOPICS: ${{ inputs.TOPICS }}
        INCLUDE_CITATIONS: ${{ inputs.INCLUDE_CITATIONS }}
        SEMANTIC_SCHOLAR_API_KEY: ${{ inputs.SEMANTIC_SCHOLAR_API_KEY }}
        MAX_AGE_DAYS: ${{ inputs.MAX_AGE_DAYS }}
        DATE_FROM: ${{ inputs.DATE_FROM }}
        DATE_TO: ${{ inputs.DATE_TO }}
        PAGE_SIZE: ${{ inputs.PAGE_SIZE }}
        MAX_PAGES: ${{ inputs.MAX_PAGES }}
        DAYS: ${{ inputs.DAYS }}
        CATEGORIES: ${{ inputs.CATEGORIES }}
        PYTHONPATH: ${{ github.action_path }}
        UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/.venv
      run: |
        uv sync --frozen --no-dev --project "${{ github.action_path }}"
        uv run --project "${{ github.action_path }}" python "${{ github.action_path }}/src/app.py"

    - name: Commit via PR if changes
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.TOKEN || github.token }}
        OUT_DIR: ${{ inputs.OUT_DIR }}
        REPO: ${{ github.repository }}
      run: |
        if [ ! -d "$OUT_DIR" ]; then
          echo "OUT_DIR ($OUT_DIR) does not exist — fetcher wrote nothing (e.g. arXiv probe failure). Skipping commit."
          exit 0
        fi
        git add "$OUT_DIR"
        git diff --cached --quiet && echo "No changes. Nothing to do." && exit 0
        DATE=$(date -u +%Y%m%d-%H%M%S)
        BRANCH="auto-update-$DATE"
        BASE_SHA=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
        BASE_TREE=$(gh api "repos/$REPO/git/commits/$BASE_SHA" --jq '.tree.sha')
        echo '[]' > /tmp/tree_entries.json
        git diff --cached --name-only | while IFS= read -r file; do
          base64 -w0 "$file" > /tmp/blob_content.b64
          BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
            --input <(jq -n --rawfile content /tmp/blob_content.b64 \
              '{content: $content, encoding: "base64"}') --jq '.sha')
          jq --arg path "$file" --arg sha "$BLOB_SHA" \
            '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]' \
            /tmp/tree_entries.json > /tmp/tree_entries_tmp.json \
            && mv /tmp/tree_entries_tmp.json /tmp/tree_entries.json
        done
        NEW_TREE=$(gh api "repos/$REPO/git/trees" \
          --input <(jq -n --arg base "$BASE_TREE" --slurpfile tree /tmp/tree_entries.json \
            '{base_tree: $base, tree: $tree[0]}') --jq '.sha')
        COMMIT_SHA=$(gh api "repos/$REPO/git/commits" \
          --input <(jq -n --arg msg "Updated $OUT_DIR" --arg tree "$NEW_TREE" --arg parent "$BASE_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}') --jq '.sha')
        gh api "repos/$REPO/git/refs" -f ref="refs/heads/$BRANCH" -f sha="$COMMIT_SHA"
        PR_NUM=$(gh api "repos/$REPO/pulls" \
          -f title="chore: update $OUT_DIR" \
          -f body="Auto-generated by bioRxiv Stats Action." \
          -f head="$BRANCH" -f base=main --jq '.number')
        gh api "repos/$REPO/pulls/$PR_NUM/merge" -X PUT \
          -f merge_method=squash \
          -f commit_title="chore: update $OUT_DIR"
        gh api "repos/$REPO/git/refs/heads/$BRANCH" -X DELETE || true
